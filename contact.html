  <body>
    <header>
      <nav>
        <div class="logo">SolarLight Co.</div>

        </ul>
      </nav>
    </header>

    <main>
      <section class="contact">
        <h1>Contact Us</h1>
        <div class="contact-info">
          <div>
            <h3>Get in Touch</h3>
            <p>Email: info@solarlightco.com</p>
            <p>Phone: (123) 456-7890</p>
            <p>Location: 123 Solar Street, Green City, GC 12345</p>
          </div>
          <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.1!2d-73.9!3d40.7!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDAuNzAwMDAwLCAtNzMuOTAwMDAw!5e0!3m2!1sen!2sus!4v1234567890!5m2!1sen!2sus" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
        <form class="contact-form">
          <h3>Send us a Message</h3>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
          <label for="message">Message:</label>
          <textarea id="message" name="message" required></textarea>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </section>
    </main>
